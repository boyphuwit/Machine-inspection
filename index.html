<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Machine Inspection — Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #F7FAFC; color: #1A202C; min-height: 100vh;
  }
  .top-bar {
    background: #06C755; color: #fff; padding: 20px 24px;
  }
  .top-bar h1 { font-size: 20px; font-weight: 600; }
  .top-bar p { font-size: 13px; opacity: .85; margin-top: 4px; }
  .body { padding: 20px 16px; max-width: 800px; margin: 0 auto; }
  h2 { font-size: 14px; font-weight: 600; color: #4A5568; margin: 20px 0 12px; letter-spacing: .04em; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .machine-card {
    background: #fff; border-radius: 12px; border: 1px solid #E2E8F0;
    padding: 14px; text-decoration: none; color: inherit;
    display: block; transition: box-shadow .15s;
  }
  .machine-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.1); }
  .mc-id { font-size: 10px; font-weight: 700; color: #06C755; letter-spacing: .08em; margin-bottom: 4px; }
  .mc-name { font-size: 14px; font-weight: 600; line-height: 1.3; margin-bottom: 2px; }
  .mc-loc { font-size: 12px; color: #718096; }
  .mc-icon { font-size: 24px; margin-bottom: 6px; }
  .action-row {
    display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px;
  }
  .action-btn {
    padding: 12px 18px; border-radius: 10px; text-decoration: none;
    font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px;
  }
  .action-btn.qr { background: #EBF8F1; color: #047a38; }
  .action-btn.docs { background: #EBF4FF; color: #2B6CB0; }
</style>
</head>
<body>
<div class="top-bar">
  <h1>🔧 ระบบตรวจสอบเครื่องจักร</h1>
  <p>สแกน QR Code ที่จุดตรวจเพื่อเปิดฟอร์ม หรือเลือกเครื่องจักรด้านล่าง</p>
</div>

<div class="body">
  <div class="action-row">
    <a href="qr-generator/index.html" class="action-btn qr">📲 สร้าง QR Code</a>
    <a href="https://notify-bot.line.me/th/" target="_blank" class="action-btn docs">🔑 ขอ Line Token</a>
  </div>

  <h2>รายการจุดตรวจสอบ</h2>
  <div class="grid" id="machine-grid"></div>
</div>

<script src="js/config.js"></script>
<script>
const grid = document.getElementById('machine-grid');
const icons = { pump: '💧', belt: '⚙️', mixer: '🌀', silo: '🏗️', default: '🔧' };

MACHINES.forEach(m => {
  const a = document.createElement('a');
  a.href = `inspect.html?id=${encodeURIComponent(m.id)}`;
  a.className = 'machine-card';
  a.innerHTML = `
    <div class="mc-icon">🔧</div>
    <div class="mc-id">${m.id}</div>
    <div class="mc-name">${m.name}</div>
    <div class="mc-loc">${m.location || ''}</div>
  `;
  grid.appendChild(a);
});
</script>
</body>
</html>
