<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QR Generator — Machine Inspection</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #F7FAFC; color: #1A202C; padding: 24px 16px 48px;
  }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .sub { font-size: 14px; color: #718096; margin-bottom: 24px; }

  .url-input-row {
    display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .url-input-row input {
    flex: 1; min-width: 240px; padding: 10px 14px; border-radius: 10px;
    border: 1px solid #CBD5E0; font-size: 14px; background: #fff; outline: none;
  }
  .url-input-row input:focus { border-color: #06C755; }
  .url-input-row button {
    padding: 10px 18px; background: #06C755; color: #fff; border: none;
    border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
  }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }

  .qr-card {
    background: #fff; border-radius: 14px; border: 1px solid #E2E8F0;
    padding: 20px; text-align: center; break-inside: avoid;
  }
  .qr-card .machine-id {
    font-size: 11px; font-weight: 700; color: #06C755; letter-spacing: .1em;
    margin-bottom: 4px;
  }
  .qr-card .machine-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .qr-card .machine-loc { font-size: 12px; color: #718096; margin-bottom: 12px; }
  .qr-canvas { display: flex; justify-content: center; margin-bottom: 12px; }
  .qr-canvas canvas, .qr-canvas img { border-radius: 4px; }
  .url-display {
    font-size: 10px; color: #A0AEC0; word-break: break-all;
    line-height: 1.4; margin-bottom: 10px;
  }
  .dl-btn {
    display: inline-block; padding: 6px 14px; background: #EBF8F1;
    color: #047a38; border: none; border-radius: 6px; font-size: 12px;
    font-weight: 600; cursor: pointer; text-decoration: none;
  }
  .dl-btn:hover { background: #D4F1E0; }

  .print-btn {
    margin-bottom: 20px; padding: 10px 20px; background: #2D3748;
    color: #fff; border: none; border-radius: 10px; font-size: 14px;
    font-weight: 600; cursor: pointer;
  }

  .notice {
    background: #EBF8F1; border: 1px solid #9AE6B4; border-radius: 10px;
    padding: 14px 16px; font-size: 13px; color: #276749; margin-bottom: 20px;
    line-height: 1.6;
  }
  .notice strong { display: block; margin-bottom: 4px; }

  @media print {
    body { background: #fff; padding: 0; }
    .no-print { display: none !important; }
    .grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .qr-card { border: 1px solid #ccc; page-break-inside: avoid; }
  }
</style>
</head>
<body>

<h1>🔧 QR Code Generator</h1>
<p class="sub">สร้าง QR Code สำหรับแต่ละจุดตรวจสอบ — สแกนแล้วเปิดฟอร์มได้ทันที</p>

<div class="notice no-print">
  <strong>📌 วิธีใช้</strong>
  1. ใส่ URL ของ GitHub Pages ของคุณด้านล่าง เช่น <code>https://username.github.io/repo-name</code><br>
  2. กด "สร้าง QR" แล้วกด "Print" เพื่อพิมพ์ทุก QR พร้อมกัน
</div>

<div class="url-input-row no-print">
  <input type="text" id="base-url" placeholder="https://username.github.io/machine-inspection" value="">
  <button onclick="generateAll()">🔄 สร้าง QR</button>
  <button class="print-btn" onclick="window.print()">🖨️ Print ทั้งหมด</button>
</div>

<div class="grid" id="qr-grid"></div>

<script src="../js/config.js"></script>
<script>
function generateAll() {
  const base = document.getElementById('base-url').value.trim().replace(/\/$/, '');
  if (!base) { alert('กรุณาใส่ URL ก่อน'); return; }

  const grid = document.getElementById('qr-grid');
  grid.innerHTML = '';

  MACHINES.forEach(m => {
    const url = `${base}/inspect.html?id=${encodeURIComponent(m.id)}`;

    const card = document.createElement('div');
    card.className = 'qr-card';
    card.innerHTML = `
      <div class="machine-id">${m.id}</div>
      <div class="machine-name">${m.name}</div>
      <div class="machine-loc">${m.location || ''}</div>
      <div class="qr-canvas" id="qr-${m.id}"></div>
      <div class="url-display">${url}</div>
    `;

    const dlBtn = document.createElement('button');
    dlBtn.className = 'dl-btn no-print';
    dlBtn.textContent = '⬇ บันทึกรูป';
    card.appendChild(dlBtn);

    grid.appendChild(card);

    // Generate QR
    const qrDiv = card.querySelector(`#qr-${m.id}`);
    const qr = new QRCode(qrDiv, {
      text: url,
      width: 160,
      height: 160,
      colorDark: '#1A202C',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });

    // Download button
    dlBtn.onclick = () => {
      setTimeout(() => {
        const canvas = qrDiv.querySelector('canvas');
        if (!canvas) return;

        // Create printable canvas with label
        const out = document.createElement('canvas');
        out.width = 320; out.height = 420;
        const ctx = out.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, 320, 420);
        ctx.drawImage(canvas, 80, 30, 160, 160);

        ctx.fillStyle = '#1A202C';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(m.id, 160, 220);

        ctx.font = 'bold 16px Arial';
        ctx.fillText(m.name, 160, 244);

        ctx.fillStyle = '#718096';
        ctx.font = '13px Arial';
        ctx.fillText(m.location || '', 160, 266);

        const a = document.createElement('a');
        a.href = out.toDataURL('image/png');
        a.download = `QR_${m.id}.png`;
        a.click();
      }, 200);
    };
  });
}

// Auto-generate with current origin if already on GitHub Pages
window.addEventListener('load', () => {
  if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    const base = location.origin + location.pathname.replace('/qr-generator/index.html', '');
    document.getElementById('base-url').value = base;
    generateAll();
  }
});
</script>
</body>
</html>
