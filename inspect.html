<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ตรวจสอบเครื่องจักร</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #06C755;
    --accent-bg: #e8f8ee;
    --danger: #E53E3E;
    --danger-bg: #fff5f5;
    --gray: #718096;
    --border: #E2E8F0;
    --surface: #F7FAFC;
    --text: #1A202C;
    --text-sub: #4A5568;
    --radius: 12px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--surface); color: var(--text); min-height: 100vh; padding-bottom: 32px; }
  .header { background: linear-gradient(135deg, #06C755 0%, #04a344 100%); color: #fff; padding: 20px 20px 24px; }
  .header-tag { font-size: 11px; font-weight: 600; letter-spacing: .08em; opacity: .85; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .header h1 { font-size: 20px; font-weight: 600; margin-bottom: 2px; }
  .header .sub { font-size: 13px; opacity: .85; margin-bottom: 12px; }
  .meta-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .meta-chip { background: rgba(255,255,255,.22); border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 500; }
  .body { padding: 20px 16px; display: flex; flex-direction: column; gap: 20px; }
  .card { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  .card-title { font-size: 12px; font-weight: 600; color: var(--text-sub); letter-spacing: .04em; padding: 12px 16px 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
  .check-list { padding: 8px; display: flex; flex-direction: column; gap: 4px; }
  .check-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px; border-radius: 8px; user-select: none; }
  .check-item.state-pass { background: var(--accent-bg); }
  .check-item.state-fail { background: var(--danger-bg); }
  .toggle-wrap { display: flex; gap: 4px; flex-shrink: 0; margin-top: 2px; }
  .toggle-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border); background: #fff; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all .15s; -webkit-tap-highlight-color: transparent; }
  .toggle-btn.pass-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .toggle-btn.fail-btn.active { background: var(--danger); border-color: var(--danger); color: #fff; }
  .check-text { flex: 1; }
  .check-label { font-size: 14px; line-height: 1.4; }
  .check-desc { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .item-status { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; margin-top: 4px; display: inline-block; }
  .item-status.pass { background: var(--accent-bg); color: #047a38; }
  .item-status.fail { background: var(--danger-bg); color: var(--danger); }
  textarea { width: 100%; border: none; padding: 14px 16px; font-size: 14px; font-family: inherit; color: var(--text); background: transparent; resize: none; outline: none; min-height: 90px; }
  textarea::placeholder { color: #A0AEC0; }
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px; }
  .photo-slot { aspect-ratio: 1; border-radius: 10px; border: 1.5px dashed #CBD5E0; background: var(--surface); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; position: relative; overflow: hidden; transition: border-color .15s; }
  .photo-slot:hover { border-color: var(--accent); }
  .photo-slot input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .photo-slot img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
  .photo-slot .remove-btn { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,.55); color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; }
  .photo-slot .slot-icon { font-size: 22px; color: #A0AEC0; }
  .photo-slot .slot-text { font-size: 11px; color: #A0AEC0; }
  input[type=text] { width: 100%; border: none; padding: 14px 16px; font-size: 14px; font-family: inherit; color: var(--text); background: transparent; outline: none; }
  input[type=text]::placeholder { color: #A0AEC0; }
  .summary-bar { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 16px; display: flex; gap: 20px; }
  .sum-item { text-align: center; flex: 1; }
  .sum-num { font-size: 22px; font-weight: 600; }
  .sum-label { font-size: 11px; color: var(--gray); margin-top: 2px; }
  .sum-item.pass .sum-num { color: var(--accent); }
  .sum-item.fail .sum-num { color: var(--danger); }
  .sum-item.pending .sum-num { color: #A0AEC0; }
  .submit-btn { width: 100%; padding: 16px; background: #06C755; color: #fff; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity .2s, transform .1s; }
  .submit-btn:hover { opacity: .9; }
  .submit-btn:active { transform: scale(.98); }
  .submit-btn:disabled { opacity: .5; cursor: not-allowed; }
  .submit-btn.danger { background: var(--danger); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1A202C; color: #fff; padding: 12px 20px; border-radius: 20px; font-size: 13px; white-space: nowrap; transition: transform .3s; z-index: 100; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: #047a38; }
  .toast.error { background: var(--danger); }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
  .overlay.show { display: flex; }
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .overlay p { color: #fff; font-size: 14px; }
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <p>กำลังส่งข้อมูลไปยัง Line…</p>
</div>

<div class="toast" id="toast"></div>

<div class="header">
  <div class="header-tag">📋 จุดตรวจ <span id="hdr-id">—</span></div>
  <h1 id="hdr-name">กำลังโหลด…</h1>
  <div class="sub" id="hdr-location"></div>
  <div class="meta-row">
    <div class="meta-chip">🕐 <span id="hdr-time"></span></div>
    <div class="meta-chip">📍 <span id="hdr-loc-chip"></span></div>
  </div>
</div>

<div class="body">
  <div class="summary-bar">
    <div class="sum-item pass"><div class="sum-num" id="sum-pass">0</div><div class="sum-label">ผ่าน</div></div>
    <div class="sum-item fail"><div class="sum-num" id="sum-fail">0</div><div class="sum-label">ไม่ผ่าน</div></div>
    <div class="sum-item pending"><div class="sum-num" id="sum-pending">0</div><div class="sum-label">รอตรวจ</div></div>
  </div>

  <div class="card">
    <div class="card-title">✅ รายการตรวจสอบ</div>
    <div class="check-list" id="check-list"></div>
  </div>

  <div class="card">
    <div class="card-title">👤 ผู้ตรวจสอบ</div>
    <input type="text" id="inspector" placeholder="ชื่อ-นามสกุล ผู้ตรวจ" autocomplete="name">
  </div>

  <div class="card">
    <div class="card-title">📝 หมายเหตุ / สิ่งที่พบ</div>
    <textarea id="note" placeholder="ระบุสิ่งที่พบ, ค่าที่อ่านได้, หรือสิ่งผิดปกติ…"></textarea>
  </div>

  <div class="card">
    <div class="card-title">📷 รูปถ่าย (ไม่เกิน 3 รูป)</div>
    <div class="photo-grid" id="photo-grid"></div>
  </div>

  <button class="submit-btn" id="submit-btn" onclick="submitInspection()">
    💬 ส่งผลการตรวจและแจ้ง Line
  </button>
</div>

<script src="js/config.js"></script>
<script>
// ── ใส่ Google Apps Script URL ที่นี่ ──
const PROXY_URL = 'https://script.google.com/macros/s/AKfycbz6teXWoyC_aQyqcVao3NLCFvTtOZKHGSWThAsmNnCAD5_tElmlsNDmPmiJ4x2Iaxcy/exec';

let machine = null;
let checks = [];
let photos = [];

function init() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const now = new Date();
  document.getElementById('hdr-time').textContent = now.toLocaleString('th-TH', {
    day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
  });

  machine = MACHINES.find(m => m.id === id);
  if (!machine) {
    document.getElementById('hdr-name').textContent = 'ไม่พบ ID: ' + id;
    document.getElementById('hdr-location').textContent = 'กรุณาสแกน QR Code ที่ถูกต้อง';
    return;
  }

  document.getElementById('hdr-id').textContent = machine.id;
  document.getElementById('hdr-name').textContent = machine.name;
  document.getElementById('hdr-location').textContent = machine.location || '';
  document.getElementById('hdr-loc-chip').textContent = machine.zone || machine.location || '—';
  document.title = 'ตรวจสอบ: ' + machine.name;

  checks = machine.checks.map((c, i) => ({
    id: i,
    label: typeof c === 'string' ? c : c.label,
    desc: typeof c === 'object' ? c.desc || '' : '',
    state: 'pending'
  }));

  renderChecklist();
  renderPhotos();
  updateSummary();
}

function renderChecklist() {
  const list = document.getElementById('check-list');
  list.innerHTML = '';
  checks.forEach(c => {
    const div = document.createElement('div');
    div.className = 'check-item' + (c.state !== 'pending' ? ' state-' + c.state : '');
    div.innerHTML = `
      <div class="toggle-wrap">
        <button class="toggle-btn pass-btn${c.state === 'pass' ? ' active' : ''}" onclick="setCheck(${c.id},'pass')">✓</button>
        <button class="toggle-btn fail-btn${c.state === 'fail' ? ' active' : ''}" onclick="setCheck(${c.id},'fail')">✗</button>
      </div>
      <div class="check-text">
        <div class="check-label">${c.label}</div>
        ${c.desc ? `<div class="check-desc">${c.desc}</div>` : ''}
        ${c.state !== 'pending' ? `<span class="item-status ${c.state}">${c.state === 'pass' ? '✓ ผ่าน' : '✗ ไม่ผ่าน'}</span>` : ''}
      </div>`;
    list.appendChild(div);
  });
}

function setCheck(id, state) {
  const c = checks.find(x => x.id === id);
  if (!c) return;
  c.state = c.state === state ? 'pending' : state;
  renderChecklist();
  updateSummary();
}

function updateSummary() {
  const pass = checks.filter(c => c.state === 'pass').length;
  const fail = checks.filter(c => c.state === 'fail').length;
  const pending = checks.filter(c => c.state === 'pending').length;
  document.getElementById('sum-pass').textContent = pass;
  document.getElementById('sum-fail').textContent = fail;
  document.getElementById('sum-pending').textContent = pending;
  const btn = document.getElementById('submit-btn');
  btn.className = fail > 0 ? 'submit-btn danger' : 'submit-btn';
}

function renderPhotos() {
  const grid = document.getElementById('photo-grid');
  grid.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const slot = document.createElement('div');
    slot.className = 'photo-slot';
    if (photos[i]) {
      slot.innerHTML = `<img src="${photos[i]}" alt="รูปที่ ${i+1}"><button class="remove-btn" onclick="removePhoto(${i})">✕</button>`;
    } else {
      slot.innerHTML = `<input type="file" accept="image/*" capture="environment" onchange="addPhoto(event,${i})"><div class="slot-icon">📷</div><div class="slot-text">+ เพิ่มรูป</div>`;
    }
    grid.appendChild(slot);
  }
}

function addPhoto(e, idx) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const max = 800;
      let w = img.width, h = img.height;
      if (w > max || h > max) {
        if (w > h) { h = Math.round(h * max / w); w = max; }
        else { w = Math.round(w * max / h); h = max; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      photos[idx] = canvas.toDataURL('image/jpeg', 0.7);
      renderPhotos();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function removePhoto(idx) {
  photos.splice(idx, 1);
  renderPhotos();
}

async function submitInspection() {
  if (!machine) return;
  const inspector = document.getElementById('inspector').value.trim();
  if (!inspector) {
    showToast('กรุณาระบุชื่อผู้ตรวจสอบ', 'error');
    return;
  }
  const pending = checks.filter(c => c.state === 'pending').length;
  if (pending > 0 && !confirm(`ยังมี ${pending} รายการที่ยังไม่ได้ตรวจ\nต้องการส่งผลแบบไม่ครบถ้วนหรือไม่?`)) return;

  document.getElementById('overlay').classList.add('show');
  try {
    await sendToLine(inspector);
    document.getElementById('overlay').classList.remove('show');
    showToast('✅ ส่งผลการตรวจเรียบร้อยแล้ว', 'success');
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '✅ ส่งแล้ว';
  } catch (err) {
    document.getElementById('overlay').classList.remove('show');
    showToast('❌ ส่งไม่สำเร็จ: ' + err.message, 'error');
    console.error(err);
  }
}

async function sendToLine(inspector) {
  const now = new Date().toLocaleString('th-TH');
  const pass = checks.filter(c => c.state === 'pass');
  const fail = checks.filter(c => c.state === 'fail');
  const pending = checks.filter(c => c.state === 'pending');
  const note = document.getElementById('note').value.trim();
  const status = fail.length > 0 ? '⚠️ พบปัญหา' : pending.length > 0 ? '📋 ตรวจไม่ครบ' : '✅ ปกติ';

  let msg = `\n🔧 ผลการตรวจสอบเครื่องจักร\n`;
  msg += `━━━━━━━━━━━━━━━━━━\n`;
  msg += `📍 ${machine.name}\n`;
  msg += `🏭 ${machine.location || '—'}\n`;
  msg += `🆔 จุดตรวจ: ${machine.id}\n`;
  msg += `👤 ผู้ตรวจ: ${inspector}\n`;
  msg += `🕐 เวลา: ${now}\n`;
  msg += `📊 สถานะ: ${status}\n`;
  msg += `━━━━━━━━━━━━━━━━━━\n`;
  msg += `✅ ผ่าน ${pass.length} รายการ\n`;
  if (fail.length > 0) {
    msg += `❌ ไม่ผ่าน ${fail.length} รายการ:\n`;
    fail.forEach(c => { msg += `  • ${c.label}\n`; });
  }
  if (pending.length > 0) msg += `⬜ ยังไม่ตรวจ ${pending.length} รายการ\n`;
  if (note) { msg += `━━━━━━━━━━━━━━━━━━\n📝 หมายเหตุ:\n${note}\n`; }
  msg += `━━━━━━━━━━━━━━━━━━`;

  // ส่งผ่าน hidden form เพื่อหลีกเลี่ยง CORS
  const payload = JSON.stringify({ message: msg, photos: photos });
  
  await new Promise((resolve, reject) => {
    const iframe = document.createElement('iframe');
    iframe.name = 'hidden_iframe_' + Date.now();
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    const form = document.createElement('form');
    form.method = 'POST';
    form.action = PROXY_URL;
    form.target = iframe.name;
    form.style.display = 'none';

    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'data';
    input.value = payload;
    form.appendChild(input);

    document.body.appendChild(form);

    iframe.onload = () => {
      document.body.removeChild(form);
      document.body.removeChild(iframe);
      resolve();
    };

    setTimeout(() => {
      document.body.removeChild(form);
      document.body.removeChild(iframe);
      resolve();
    }, 8000);

    form.submit();
  });
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => t.className = 'toast', 3500);
}

init();
</script>
</body>
</html>
